name: doctoolchain-ci

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug workspace
        run: |
          pwd
          ls -R

      - name: Run doctoolchain-action
        uses: ./
        with:
          dtcw-path: "./dtcw"
          config-file: "docToolchainConfig.groovy"
          output-path: "build/docs"