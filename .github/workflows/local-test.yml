name: doctoolchain-ci

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run doctoolchain-action
        uses: ./
        with:
          config-file: "docToolchainConfig.groovy"
          output-path: "build/docs"
          fail-on-warning: "true"

      - run: ls -R build/docs

      - name: Upload docs
        uses: actions/upload-artifact@v7
        with:
          name: doctoolchain-docs
          path: build/docs
