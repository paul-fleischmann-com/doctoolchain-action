name: CI test doctoolchain-action

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run doctoolchain-action (local path)
        uses: ./
        with:
          # hier deine echten Inputs aus action.yml eintragen
          version: "3.4.1"