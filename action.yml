name: docToolchain
description: Build AsciiDoc documentation via docToolchain using dtcw (docker backend)

branding:
  icon: book
  color: blue

inputs:
  output-path:
    description: Output directory for generated docs (DTC_OUTPUT_PATH)
    required: false
    default: build/docs

  tasks:
    description: docToolchain tasks (e.g. "generateHTML generatePDF")
    required: false
    default: generateHTML

  config-file:
    description: Path to docToolchainConfig.groovy relative to repo root
    required: false
    default: docToolchainConfig.groovy

runs:
  using: composite
  steps:

    - name: Checkout safety check
      uses: actions/checkout@v4

    - name: Ensure dtcw exists (controlled bootstrap)
      shell: bash
      run: |
        set -e

        echo "Checking dtcw..."

        if [ ! -f "./dtcw" ]; then
          echo "dtcw missing → downloading stable version"
          curl -fsSL https://doctoolchain.org/dtcw -o ./dtcw
          chmod +x ./dtcw
        fi

        echo "dtcw ready: $(ls -l ./dtcw)"

    - name: Validate config
      shell: bash
      run: |
        set -e

        echo "Workspace: $(pwd)"
        echo "Listing docs:"
        ls -R

        if [ ! -f "${{ inputs.config-file }}" ]; then
          echo "ERROR: config file not found: ${{ inputs.config-file }}"
          exit 1
        fi
    - name: Debug
      shell: bash
      run: |
        pwd
        ls -R
        find . -name dtcw
        find . -name index.adoc
    - name: Run docToolchain (dtcw docker backend)
      shell: bash
      env:
        DTC_OUTPUT_PATH: ${{ inputs.output-path }}
        DTC_CONFIG_FILE: ${{ inputs.config-file }}
      run: |
        set -euo pipefail

        echo "Running docToolchain..."
        echo "Output: $DTC_OUTPUT_PATH"
        echo "Config: $DTC_CONFIG_FILE"
        echo "Tasks: ${{ inputs.tasks }}"

        ./dtcw docker \
          -e DTC_OUTPUT_PATH="$DTC_OUTPUT_PATH" \
          -e DTC_CONFIG_FILE="$DTC_CONFIG_FILE" \
          ${{ inputs.tasks }}