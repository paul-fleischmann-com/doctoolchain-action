name: docToolchain
description: Build AsciiDoc documentation via docToolchain (dtcw docker). No local Java/Gradle install required.

branding:
  icon: book
  color: blue

inputs:
  output-path:
    description: Output directory for generated docs (DTC_OUTPUT_PATH)
    required: false
    default: build/docs

  tasks:
    description: Space-separated docToolchain tasks (e.g. "generateHTML generatePDF")
    required: false
    default: generateHTML

  config-file:
    description: Path to docToolchainConfig.groovy relative to repo root
    required: false
    default: docToolchainConfig.groovy

runs:
  using: composite
  steps:

    - name: Validate workspace
      shell: bash
      run: |
        set -e

        echo "PWD: $(pwd)"
        echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"

        if [ ! -f "${{ inputs.config-file }}" ]; then
          echo "ERROR: config-file not found: ${{ inputs.config-file }}"
          echo "Current tree:"
          ls -R
          exit 1
        fi

    - name: Run docToolchain via dtcw (docker mode)
      shell: bash
      env:
        DTC_OUTPUT_PATH: ${{ inputs.output-path }}
        DTC_CONFIG_FILE: ${{ inputs.config-file }}
      run: |
        set -euo pipefail

        export WORKSPACE="$GITHUB_WORKSPACE"

        echo "Using workspace: $WORKSPACE"
        echo "Config: $DTC_CONFIG_FILE"
        echo "Output: $DTC_OUTPUT_PATH"
        echo "Tasks: ${{ inputs.tasks }}"

        # ALWAYS run from repo root
        cd "$WORKSPACE"

        # ensure dtcw exists
        if [ ! -f "./dtcw" ]; then
          echo "ERROR: dtcw not found in repo root"
          exit 1
        fi

        chmod +x ./dtcw

        # deterministic execution
        ./dtcw docker \
          -e DTC_OUTPUT_PATH="$DTC_OUTPUT_PATH" \
          -e DTC_CONFIG_FILE="$DTC_CONFIG_FILE" \
          ${{ inputs.tasks }}